<!DOCTYPE html>
<html>
<head>
  <title>Mallorca 2026 Test Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    #map { height: 90vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([39.60, 2.95], 10);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Load municipales
  fetch('data/municipales.geojson')
    .then(res => res.json())
    .then(data => {
      const geojson = L.geoJSON(data, {
        style: {
          color: 'black',  // border only
          weight: 1,
          fill: false
        }
      }).addTo(map);

      // Add labels in the center of each polygon
      geojson.eachLayer(function(layer) {
        if (layer.feature.properties && layer.feature.properties["NAMEUNIT"]) {
          const name = layer.feature.properties["NAMEUNIT"];
          const center = layer.getBounds().getCenter(); // centroid of polygon
          const label = L.marker(center, {
            icon: L.divIcon({
              className: 'municipal-label',
              html: `<span>${name}</span>`,
              iconSize: [100, 20],
              iconAnchor: [50, 10]
            })
          }).addTo(map);

          // Show label only above a certain zoom
          map.on('zoomend', function() {
            if (map.getZoom() >= 10) {
              label.getElement().style.display = 'block';
            } else {
              label.getElement().style.display = 'none';
            }
          });
        }
      });
    });



  // Load trails
  fetch('data/rothertouren.geojson')
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        style: { color: 'Indigo' },

        onEachFeature: function (feature, layer) {
        if (feature.properties && feature.properties.name) {
          layer.bindPopup(feature.properties.name);
        }
        }

      }).addTo(map);
    });

  // Load plants
  fetch('data/flora_incognita.geojson')
    .then(res => res.json())
    .then(data => {
      L.geoJSON(data, {
        pointToLayer: (feature, latlng) =>
          L.circleMarker(latlng, { radius: 1, color: 'Green' }),

        onEachFeature: function (feature, layer) {
        if (feature.properties && feature.properties["scientific name"]) {
          layer.bindPopup(feature.properties["scientific name"]);
        }
      }
      }).addTo(map);
    });

</script>

</body>
</html>
